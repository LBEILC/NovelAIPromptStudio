name: Package and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            platform: win
            arch: x64
            artifact: windows-x64
            artifact_glob: release/*.exe
          - name: macOS Intel
            os: macos-15-intel
            platform: mac
            arch: x64
            artifact: macos-x64
            artifact_glob: release/*.dmg
          - name: macOS Apple Silicon
            os: macos-15
            platform: mac
            arch: arm64
            artifact: macos-arm64
            artifact_glob: release/*.dmg

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Verify release tag
        if: github.ref_type == 'tag'
        run: node scripts/verify-release-tag.mjs "${{ github.ref_name }}"

      - name: Package application
        run: npm run package -- --${{ matrix.platform }} --${{ matrix.arch }}

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create checksums
        working-directory: release-artifacts
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          release-artifacts/*
          --verify-tag
          --generate-notes
          --notes "Windows and macOS packages in this release are currently unsigned. Your operating system may display a security warning."
          --title "NovelAI Prompt Studio ${{ github.ref_name }}"
